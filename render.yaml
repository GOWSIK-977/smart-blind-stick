services:
  - type: web
    name: smart-blind-stick
    runtime: python
    plan: free

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
